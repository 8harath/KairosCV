services:
  # Next.js Frontend — deployed on Render.com (Node env / pnpm build).
  #
  # Docker alternative (feature/agentic-ai-langchain branch):
  #   docker compose up --build          — local production stack
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
  #                                      — hardened production stack
  #   Image is also published to GHCR via .github/workflows/docker.yml
  - type: web
    name: kairoscv-frontend
    env: node
    plan: free
    branch: main
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false  # Primary LLM — set in Render dashboard (https://console.groq.com)
      - key: GOOGLE_GEMINI_API_KEY
        sync: false  # Fallback LLM — set in Render dashboard (https://ai.google.dev)
    region: oregon

