name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 09:00 UTC to catch newly published CVEs
    - cron: "0 9 * * 1"

jobs:
  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kairoscv:scan
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_DISABLE_AUTH=false
            NEXT_TELEMETRY_DISABLED=1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kairoscv:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"        # fail the job on CRITICAL/HIGH findings
          ignore-unfixed: true  # skip vulnerabilities with no available fix

      - name: Upload scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
